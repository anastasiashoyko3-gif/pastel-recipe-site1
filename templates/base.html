
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Pastel Recipes{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
    <a class="logo" href="{{ url_for('index') }}">🍰 Pastel Recipes</a>
    <nav>
        <a href="{{ url_for('index') }}">Головна</a>
        <a href="{{ url_for('random_recipe') }}">Random</a>
        <a href="{{ url_for('admin_login') }}">Адмінка</a>
    </nav>
</header>

<main class="container">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>

<footer class="footer">З любов’ю до смачних рецептів ✨</footer>
</body>
</html>
